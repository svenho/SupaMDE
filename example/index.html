<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SupaMDE — M2 Aktionen</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    </style>
  </head>
  <body>
    <h1>SupaMDE</h1>
    <p>M2: Live formatierender Editor mit Tastenkürzeln. Probiere
      <kbd>Strg/Cmd</kbd>+<kbd>B</kbd> (fett), <kbd>Strg/Cmd</kbd>+<kbd>I</kbd> (kursiv),
      <kbd>Strg/Cmd</kbd>+<kbd>K</kbd> (Link), <kbd>Strg/Cmd</kbd>+<kbd>'</kbd> (Zitat),
      <kbd>Strg/Cmd</kbd>+<kbd>L</kbd> (Liste), <kbd>Strg/Cmd</kbd>+<kbd>Z</kbd> (undo).
      Enter in einer Listenzeile setzt die Liste fort.</p>
    <form>
      <textarea id="editor">
# Überschrift 1
## Überschrift 2

Ein Absatz mit **fettem**, *kursivem* und ~~durchgestrichenem~~ Text.

Inline-`code` und ein Block:

```
const x = 42;
```

> Ein Zitat.

Ein [Link](https://example.org).
</textarea>
      <button type="submit">Absenden (forceSync-Demo)</button>
    </form>
    <script type="module">
      import SupaMDE from '../src/index.ts';
      const editor = new SupaMDE({
        element: document.getElementById('editor'),
        placeholder: 'Schreibe etwas Markdown …',
      });
      // eslint-disable-next-line no-console
      console.log('SupaMDE-Version:', SupaMDE.version, editor.getValue());
    </script>
  </body>
</html>
